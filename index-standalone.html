window.NJOX = window.NJOX || {};

NJOX.Modal = class Modal {
    constructor() {
        this.visible = false;
        this.alpha = 0;
        this.title = '';
        this.body = '';
        this.showInput = false;
        this.inputValue = '';
        this.buttons = []; // { text, callback }
        this.onSubmit = null;

        // HTML input element (for boss prompt)
        this.inputEl = null;
        this.submitBtn = null;
    }

    show(opts) {
        this.visible = true;
        this.alpha = 0;
        this.title = opts.title || '';
        this.body = opts.body || '';
        this.showInput = opts.showInput || false;
        this.buttons = opts.buttons || [];
        this.onSubmit = opts.onSubmit || null;
        this.inputValue = '';

        if (this.showInput) {
            this._createInputEl();
        }
    }

    hide() {
        this.visible = false;
        this.alpha = 0;
        this._removeInputEl();
    }

    _createInputEl() {
        if (this.inputEl) return;

        const container = document.getElementById('modal-container');
        container.style.display = 'flex';

        this.inputEl = document.createElement('input');
        this.inputEl.type = 'text';
        this.inputEl.placeholder = 'Type here...';
        this.inputEl.id = 'boss-input';
        this.inputEl.maxLength = 30;

        this.submitBtn = document.createElement('button');
        this.submitBtn.textContent = 'FIGHT IT';
        this.submitBtn.id = 'boss-submit';

        container.innerHTML = '';
        const title = document.createElement('div');
        title.className = 'modal-title';
        title.textContent = this.title;
        container.appendChild(title);

        if (this.body) {
            const body = document.createElement('div');
            body.className = 'modal-body';
            body.textContent = this.body;
            container.appendChild(body);
        }

        container.appendChild(this.inputEl);
        container.appendChild(this.submitBtn);

        this.inputEl.focus();

        const handleSubmit = () => {
            const val = this.inputEl.value.trim();
            if (val && this.onSubmit) {
                this.onSubmit(val);
                this.hide();
            }
        };

        this.submitBtn.addEventListener('click', handleSubmit);
        this.inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });
    }

    _removeInputEl() {
        const container = document.getElementById('modal-container');
        if (container) {
            container.style.display = 'none';
            container.innerHTML = '';
        }
        this.inputEl = null;
        this.submitBtn = null;
    }

    update(dt) {
        if (this.visible) {
            this.alpha = Math.min(1, this.alpha + dt * 4);
        }
    }

    render(ctx) {
        if (!this.visible || this.showInput) return; // HTML handles input modal

        ctx.save();
        ctx.globalAlpha = this.alpha;

        // Backdrop
        ctx.fillStyle = NJOX.COLORS.MODAL_BG;
        ctx.fillRect(0, 0, NJOX.CANVAS_W, NJOX.CANVAS_H);

        // Box
        const boxW = 300;
        const boxH = 180;
        const boxX = (NJOX.CANVAS_W - boxW) / 2;
        const boxY = (NJOX.CANVAS_H - boxH) / 2;

        ctx.fillStyle = '#1a1a2e';
        NJOX.Utils.roundRect(ctx, boxX, boxY, boxW, boxH, 12);
        ctx.fill();
        ctx.strokeStyle = NJOX.COLORS.FLOOR;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Title
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.title, NJOX.CANVAS_W / 2, boxY + 40);

        // Body
        if (this.body) {
            ctx.fillStyle = NJOX.COLORS.TEXT_DIM;
            ctx.font = '13px monospace';
            // Word wrap
            const words = this.body.split(' ');
            let line = '';
            let lineY = boxY + 70;
            for (const word of words) {
                const test = line + word + ' ';
                if (ctx.measureText(test).width > boxW - 40) {
                    ctx.fillText(line, NJOX.CANVAS_W / 2, lineY);
                    line = word + ' ';
                    lineY += 18;
                } else {
                    line = test;
                }
            }
            ctx.fillText(line, NJOX.CANVAS_W / 2, lineY);
        }

        // Buttons
        const btnY = boxY + boxH - 45;
        const btnW = 100;
        const btnH = 30;
        const totalBtnW = this.buttons.length * (btnW + 10) - 10;
        let btnX = (NJOX.CANVAS_W - totalBtnW) / 2;

        for (const btn of this.buttons) {
            ctx.fillStyle = NJOX.COLORS.BUTTON;
            NJOX.Utils.roundRect(ctx, btnX, btnY, btnW, btnH, 6);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(btn.text, btnX + btnW / 2, btnY + btnH / 2);

            btn._x = btnX;
            btn._y = btnY;
            btn._w = btnW;
            btn._h = btnH;

            btnX += btnW + 10;
        }

        ctx.restore();
    }

    handleClick(x, y) {
        if (!this.visible || this.showInput) return;
        for (const btn of this.buttons) {
            if (x >= btn._x && x <= btn._x + btn._w &&
                y >= btn._y && y <= btn._y + btn._h) {
                if (btn.callback) btn.callback();
                return true;
            }
        }
        return false;
    }
};

window.NJOX = window.NJOX || {};

NJOX.TitleScreen = {
    time: 0,
    // Decorative floating balls
    balls: [],

    init() {
        this.time = 0;
        this.balls = [];
        for (let i = 0; i < 15; i++) {
            this.balls.push({
                x: Math.random() * NJOX.CANVAS_W,
                y: Math.random() * NJOX.CANVAS_H,
                vx: (Math.random() - 0.5) * 60,
                vy: (Math.random() - 0.5) * 60,
                radius: 3 + Math.random() * 4,
                alpha: 0.1 + Math.random() * 0.3,
            });
        }
    },

    update(dt) {
        this.time += dt;
        for (const b of this.balls) {
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            if (b.x < 0 || b.x > NJOX.CANVAS_W) b.vx *= -1;
            if (b.y < 0 || b.y > NJOX.CANVAS_H) b.vy *= -1;
        }
    },

    render(ctx) {
        // Background
        NJOX.Renderer.drawBackground(ctx, NJOX.CANVAS_W, NJOX.CANVAS_H);

        // Floating balls
        for (const b of this.balls) {
            ctx.fillStyle = `rgba(255,255,255,${b.alpha})`;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // Title
        const bounce = Math.sin(this.time * 2) * 8;
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('NJOX', NJOX.CANVAS_W / 2, 220 + bounce);

        // Subtitle
        ctx.fillStyle = NJOX.COLORS.FLOOR;
        ctx.font = '14px monospace';
        ctx.fillText('Fight Your Stress', NJOX.CANVAS_W / 2, 270 + bounce * 0.5);

        // Tap to start — pulsing
        const pulse = Math.sin(this.time * 3) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = NJOX.COLORS.TEXT_DIM;
        ctx.font = '16px monospace';
        ctx.fillText('Tap to Start', NJOX.CANVAS_W / 2, 400);
        ctx.globalAlpha = 1;

        // Decorative creature
        const creatureY = 320 + Math.sin(this.time * 1.5) * 5;
        ctx.fillStyle = NJOX.COLORS.BASIC;
        NJOX.Utils.roundRect(ctx, NJOX.CANVAS_W / 2 - 25, creatureY, 50, 50, 8);
        ctx.fill();
        NJOX.Renderer.drawFace(ctx, NJOX.CANVAS_W / 2, creatureY + 25, 50, 50, {
            blinkPhase: Math.sin(this.time * 0.5) > 0.9 ? 1 : 0,
            mouthOpen: 0,
            angry: false,
            color: '#fff',
            scale: 1,
        });

        ctx.restore();
    }
};

window.NJOX = window.NJOX || {};

NJOX.ShopUI = {
    // Render shop bar below the floor line
    render(ctx, game) {
        const shop = game.shopSystem;
        if (!shop || !shop.enabled) return;

        const y = NJOX.SHOP_Y;
        const h = NJOX.SHOP_H;

        // Background
        ctx.fillStyle = NJOX.COLORS.SHOP_BG;
        ctx.fillRect(0, y, NJOX.CANVAS_W, h);

        // Divider line
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(NJOX.CANVAS_W, y);
        ctx.stroke();

        // "SHOP" label
        ctx.fillStyle = NJOX.COLORS.TEXT_DIM;
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('SHOP', NJOX.CANVAS_W / 2, y + 2);

        // 4 item slots
        const slotW = 90;
        const slotH = 55;
        const gap = 6;
        const totalW = shop.items.length * slotW + (shop.items.length - 1) * gap;
        let startX = (NJOX.CANVAS_W - totalW) / 2;
        const slotY = y + 16;

        for (let i = 0; i < shop.items.length; i++) {
            const item = shop.items[i];
            const sx = startX + i * (slotW + gap);

            // Store hit area for click detection
            item._hitX = sx;
            item._hitY = slotY;
            item._hitW = slotW;
            item._hitH = slotH;

            const canAfford = shop.canAfford(item.id, game.gold);
            const alpha = item.unlocked ? (canAfford ? 1 : 0.4) : 0.2;

            ctx.save();
            ctx.globalAlpha = alpha;

            // Slot background
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            NJOX.Utils.roundRect(ctx, sx, slotY, slotW, slotH, 6);
            ctx.fill();

            // Border
            ctx.strokeStyle = canAfford ? item.color : 'rgba(255,255,255,0.2)';
            ctx.lineWidth = canAfford ? 1.5 : 0.5;
            ctx.stroke();

            // Icon circle
            ctx.fillStyle = item.color;
            ctx.beginPath();
            ctx.arc(sx + slotW / 2, slotY + 16, 10, 0, Math.PI * 2);
            ctx.fill();

            // Label
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 9px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.label, sx + slotW / 2, slotY + 16);

            // Cost
            ctx.font = '8px monospace';
            if (item.firstFree) {
                ctx.fillStyle = '#4ecca3';
                ctx.fillText('FREE', sx + slotW / 2, slotY + 34);
            } else {
                ctx.fillStyle = '#ffd700';
                ctx.fillText('$' + item.cost, sx + slotW / 2, slotY + 34);
            }

            // Description
            ctx.fillStyle = NJOX.COLORS.TEXT_DIM;
            ctx.font = '7px monospace';
            ctx.fillText(item.desc, sx + slotW / 2, slotY + 46);

            ctx.restore();
        }
    },

    // Handle click on shop
    handleClick(x, y, game) {
        const shop = game.shopSystem;
        if (!shop || !shop.enabled) return false;

        for (const item of shop.items) {
            if (!item._hitX) continue;
            if (x >= item._hitX && x <= item._hitX + item._hitW &&
                y >= item._hitY && y <= item._hitY + item._hitH) {
                if (shop.canAfford(item.id, game.gold)) {
                    const purchase = shop.purchase(item.id, game);
                    if (purchase) {
                        shop.applyEffect(purchase, game);
                        return true;
                    }
                }
            }
        }
        return false;
    }
};

// ===== js/main.js =====
window.NJOX = window.NJOX || {};

(function() {
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = NJOX.CANVAS_W;
    canvas.height = NJOX.CANVAS_H;

    // Core systems
    const input = new NJOX.Input(canvas);
    const ballManager = new NJOX.BallManager();
    const levelManager = new NJOX.LevelManager();
    const rewardSystem = new NJOX.RewardSystem();
    const particles = new NJOX.ParticleSystem();
    const modal = new NJOX.Modal();
    const shopSystem = new NJOX.ShopSystem();
    const fsm = new NJOX.StateMachine();

    // Game state object — shared with HUD, shop, etc.
    const game = {
        levelManager, ballManager, rewardSystem, particles, modal, shopSystem,
        gold: 0,
        collectibles: [],
        roundIndex: 1,
        shotsRemaining: NJOX.SHOTS_PER_ROUND,
    };

    // Shared state
    let skipAdvance = false;
    let bossMode = false;
    let boss = null;
    let turnEndDelay = 0;
    let levelCompleteDelay = 0;
    let gameOverDelay = 0;

    // ========== CLICK HANDLER ==========

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (NJOX.CANVAS_W / rect.width);
        const y = (e.clientY - rect.top) * (NJOX.CANVAS_H / rect.height);

        // Shop click (only in AIMING state)
        if (fsm.currentName === 'AIMING' && y >= NJOX.SHOP_Y) {
            NJOX.ShopUI.handleClick(x, y, game);
            return;
        }

        modal.handleClick(x, y);
    });

    // ========== CENTRALIZED KILL EVENT ==========

    function onCreatureKilled(creature) {
        // Particles
        particles.emitDeathBurst(creature.x, creature.y, creature.w, creature.h, creature.getColor());
        NJOX.Renderer.triggerShake(4, 0.15);

        // Gold drop — 1% chance
        if (Math.random() < 0.01) {
            const goldAmount = NJOX.Utils.randInt(1, 3 + levelManager.currentLevel);
            game.gold += goldAmount;
            game.collectibles.push({
                x: creature.x + creature.w / 2,
                y: creature.y + creature.h / 2,
                type: 'gold',
                amount: goldAmount,
                timer: 1.5,
            });
        }

        // Reward system
        rewardSystem.onCreatureKilled(creature.type);
        const reward = rewardSystem.consumeReward();
        if (reward) {
            if (reward.type === 'skipAdvance') skipAdvance = true;
            rewardSystem.applyReward(reward, ballManager);
        }
    }

    // ========== HIT CALLBACK ==========

    function onCreatureHit(creature, col, ball) {
        // Hit sparks — color based on ball type
        const sparkColor = ball.type === 'fire' ? NJOX.COLORS.FIRE
            : ball.type === 'ice' ? NJOX.COLORS.ICE
            : creature.getColor();

        particles.emitHitSparks(ball.x, ball.y, col.nx, col.ny, sparkColor);
    }

    // ========== KILL TRACKING ==========

    function checkKills() {
        const creatures = bossMode ? (boss ? [boss, ...boss.minions] : []) : levelManager.creatures;
        for (const c of creatures) {
            if (c._killHandled) continue;
            if (!c.alive) {
                c._killHandled = true;

                // Splitter spawns
                const spawns = c._pendingSpawns || [];
                if (spawns.length > 0 && !bossMode) {
                    levelManager.addCreatures(spawns);
                }

                // Centralized kill event
                if (!bossMode) {
                    onCreatureKilled(c);
                }
            }
        }

        if (boss) {
            boss.minions = boss.minions.filter(m => m.alive);
        }
    }

    // ========== SHARED UPDATE HELPERS ==========

    function updateGameSystems(dt) {
        for (const c of levelManager.creatures) c.update(dt);
        if (boss) {
            boss.update(dt);
            for (const m of boss.minions) m.update(dt);
        }
        particles.update(dt);
        rewardSystem.update(dt);
        updateCollectibles(dt);
        NJOX.Renderer.updateShake(dt);
    }

    function runPhysicsFrame(dt) {
        ballManager.update(dt);
        const creatures = bossMode ? (boss ? [boss, ...boss.minions] : []) : levelManager.creatures;
        NJOX.Physics.update(dt, ballManager, creatures, onCreatureHit);

        if (!bossMode) {
            levelManager.checkPickupCollisions(ballManager.balls, ballManager, game);
        }

        if (boss && boss.alive) {
            boss.checkMechanics(ballManager.balls, game);
        }

        if (boss) {
            let nearestX = NJOX.CANVAS_W / 2;
            let nearestDist = Infinity;
            for (const b of ballManager.balls) {
                if (!b.active) continue;
                const d = NJOX.Utils.distance(b.x, b.y, boss.x + boss.w / 2, boss.y + boss.h / 2);
                if (d < nearestDist) { nearestDist = d; nearestX = b.x; }
            }
            boss.trackX = nearestX;
        }
    }

    // ========== STATES ==========

    fsm.add('TITLE', {
        enter() {
            NJOX.TitleScreen.init();
            bossMode = false;
            boss = null;
        },
        update(dt) {
            NJOX.TitleScreen.update(dt);
            if (input.consumeLaunch()) fsm.transition('NEW_GAME');
        },
        render(c) { NJOX.TitleScreen.render(c); },
        exit() {}
    });

    fsm.add('NEW_GAME', {
        enter() {
            ballManager.totalCount = NJOX.INITIAL_BALLS;
            ballManager.balls = [];
            ballManager.launchX = NJOX.CANVAS_W / 2;
            ballManager.resetPowerUps();
            ballManager.modifierQueue = [];
            input.setLaunchOrigin(NJOX.CANVAS_W / 2);
            particles.clear();
            bossMode = false;
            boss = null;
            skipAdvance = false;
            game.gold = 0;
            game.collectibles = [];
            game.roundIndex = 1;
            game.shotsRemaining = NJOX.SHOTS_PER_ROUND;

            fsm.transition('START_LEVEL', { level: 1 });
        },
        update() {}, render() {}, exit() {}
    });

    fsm.add('START_LEVEL', {
        enter(data) {
            const level = data.level;

            // Enable shop after level 1
            if (level > 1) shopSystem.enable();

            // Boss check (after level 1)
            if (level > 1 && levelManager.isBossLevel(level)) {
                fsm.transition('BOSS_PROMPT', { level });
            } else {
                bossMode = false;
                boss = null;
                levelManager.generateLevel(level);
                rewardSystem.initForLevel(levelManager.creatures);
                NJOX.Physics.reset();
                game.roundIndex = 1;
                game.shotsRemaining = NJOX.SHOTS_PER_ROUND;
                fsm.transition('AIMING');
            }
        },
        update() {}, render() {}, exit() {}
    });

    // AIMING — player aims and clicks to shoot
    fsm.add('AIMING', {
        enter() {
            ballManager.resetPowerUps();
        },
        update(dt) {
            updateGameSystems(dt);

            // Check if no shots left → force round end
            if (!bossMode && game.shotsRemaining <= 0) {
                fsm.transition('TURN_END');
                return;
            }

            if (input.consumeLaunch()) {
                // Don't shoot if clicking shop area
                if (input.mouseY >= NJOX.SHOP_Y) return;

                game.shotsRemaining--;
                ballManager.startLaunch(input.aimAngle, input.launchX);
                fsm.transition('LAUNCHING');
            }
        },
        render(c) {
            renderGameScene(c);
            if (input.isAiming && input.mouseY < NJOX.SHOP_Y) {
                NJOX.AimLine.render(c, input.launchX, input.launchY, input.aimAngle);
            }
        },
        exit() {}
    });

    fsm.add('LAUNCHING', {
        enter() {},
        update(dt) {
            runPhysicsFrame(dt);
            updateGameSystems(dt);
            checkKills();

            if (!ballManager.launching) fsm.transition('ACTIVE_TURN');
        },
        render(c) { renderGameScene(c); },
        exit() {}
    });

    fsm.add('ACTIVE_TURN', {
        enter() {},
        update(dt) {
            runPhysicsFrame(dt);
            updateGameSystems(dt);
            checkKills();

            if (ballManager.allReturned()) {
                if (ballManager.firstLandX !== null) {
                    input.setLaunchOrigin(ballManager.firstLandX);
                    ballManager.launchX = ballManager.firstLandX;
                }
                fsm.transition('TURN_END');
            }
        },
        render(c) { renderGameScene(c); },
        exit() {}
    });

    // TURN_END — round/level progression logic
    fsm.add('TURN_END', {
        enter() {
            turnEndDelay = 0.4;

            if (bossMode) {
                if (boss && !boss.alive && boss.animState !== 'death') {
                    fsm.transition('BOSS_VICTORY');
                    return;
                }
                return;
            }

            // Clean up dead creatures
            levelManager.removeDeadCreatures();

            // Advance rows
            if (!skipAdvance) levelManager.advanceRows();
            skipAdvance = false;

            // Spawn new row from top
            levelManager.spawnNewRow(game.roundIndex);

            // Check game over
            if (levelManager.isGameOver()) {
                fsm.transition('GAME_OVER');
                return;
            }

            // Check round completion: after ROUNDS_PER_LEVEL rounds → level complete
            if (game.roundIndex >= NJOX.ROUNDS_PER_LEVEL) {
                fsm.transition('LEVEL_COMPLETE');
                return;
            }

            // Increment round
            game.roundIndex++;
            game.shotsRemaining = NJOX.SHOTS_PER_ROUND;
        },
        update(dt) {
            turnEndDelay -= dt;
            updateGameSystems(dt);
            if (turnEndDelay <= 0) fsm.transition('AIMING');
        },
        render(c) { renderGameScene(c); },
        exit() {}
    });

    fsm.add('LEVEL_COMPLETE', {
        enter() {
            levelCompleteDelay = 1.5;
            ballManager.addBalls(2);
        },
        update(dt) {
            levelCompleteDelay -= dt;
            particles.update(dt);
            NJOX.Renderer.updateShake(dt);
            if (levelCompleteDelay <= 0) {
                fsm.transition('START_LEVEL', { level: levelManager.currentLevel + 1 });
            }
        },
        render(c) {
            renderGameScene(c);
            c.save();
            c.fillStyle = 'rgba(0,0,0,0.4)';
            c.fillRect(0, 0, NJOX.CANVAS_W, NJOX.CANVAS_H);
            c.fillStyle = '#4ecca3';
            c.font = 'bold 24px monospace';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText('LEVEL CLEAR!', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 - 20);
            c.fillStyle = '#fff';
            c.font = '14px monospace';
            c.fillText('+2 Balls', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 15);
            c.restore();
        },
        exit() {}
    });

    // ========== BOSS STATES ==========

    fsm.add('BOSS_PROMPT', {
        enter(data) {
            this._level = data.level;
            levelManager.currentLevel = data.level;
            NJOX.BossFlow.startPrompt(modal, (answer) => {
                fsm.transition('BOSS_INTRO', { level: this._level, name: answer });
            });
        },
        update(dt) { modal.update(dt); },
        render(c) {
            NJOX.Renderer.drawBackground(c, NJOX.CANVAS_W, NJOX.CANVAS_H);
            modal.render(c);
        },
        exit() {}
    });

    fsm.add('BOSS_INTRO', {
        enter(data) {
            bossMode = true;
            boss = NJOX.BossFlow.createBoss(data.level, data.name);
            levelManager.creatures = [];
            NJOX.Physics.reset();
            NJOX.Renderer.triggerShake(8, 0.5);
            game.shotsRemaining = NJOX.BOSS_SHOTS;
            this._timer = 2.0;
        },
        update(dt) {
            this._timer -= dt;
            if (boss) boss.update(dt);
            particles.update(dt);
            NJOX.Renderer.updateShake(dt);
            if (this._timer <= 0) fsm.transition('AIMING');
        },
        render(c) {
            NJOX.Renderer.drawBackground(c, NJOX.CANVAS_W, NJOX.CANVAS_H);
            c.save();
            c.translate(NJOX.Renderer.shakeOffset.x, NJOX.Renderer.shakeOffset.y);
            if (boss) boss.render(c);
            const alpha = Math.min(1, (2.0 - this._timer) / 1.0);
            c.globalAlpha = alpha;
            c.fillStyle = NJOX.COLORS.FLOOR;
            c.font = 'bold 28px monospace';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText(boss.name.toUpperCase(), NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 100);
            c.fillStyle = '#fff';
            c.font = '12px monospace';
            c.fillText('YOUR STRESS AWAITS', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 130);
            c.restore();
            particles.render(c);
            NJOX.HUD.render(c, game);
            if (boss) NJOX.BossHPBar.render(c, boss);
        },
        exit() {}
    });

    fsm.add('BOSS_VICTORY', {
        enter() {
            this._timer = 3.0;
            particles.emitDeathBurst(boss.x, boss.y, boss.w, boss.h, NJOX.COLORS.BOSS_RAGE);
            particles.emitDeathBurst(boss.x, boss.y, boss.w, boss.h, '#ffd700');
            NJOX.Renderer.triggerShake(10, 0.5);
            ballManager.addBalls(3);
            game.gold += 50; // boss gold reward
        },
        update(dt) {
            this._timer -= dt;
            particles.update(dt);
            NJOX.Renderer.updateShake(dt);
            if (this._timer <= 0) {
                bossMode = false;
                boss = null;
                fsm.transition('START_LEVEL', { level: levelManager.currentLevel + 1 });
            }
        },
        render(c) {
            NJOX.Renderer.drawBackground(c, NJOX.CANVAS_W, NJOX.CANVAS_H);
            c.save();
            c.translate(NJOX.Renderer.shakeOffset.x, NJOX.Renderer.shakeOffset.y);
            particles.render(c);
            c.restore();
            c.save();
            c.fillStyle = 'rgba(0,0,0,0.4)';
            c.fillRect(0, 0, NJOX.CANVAS_W, NJOX.CANVAS_H);
            c.fillStyle = '#ffd700';
            c.font = 'bold 22px monospace';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText('YOU DEFEATED', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 - 30);
            c.fillStyle = NJOX.COLORS.FLOOR;
            c.font = 'bold 28px monospace';
            c.fillText(boss ? boss.name.toUpperCase() : 'STRESS', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 10);
            c.fillStyle = '#fff';
            c.font = '13px monospace';
            c.fillText('+3 Balls  +50 Gold', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 50);
            c.restore();
        },
        exit() {}
    });

    fsm.add('GAME_OVER', {
        enter() { gameOverDelay = 1.0; },
        update(dt) {
            gameOverDelay -= dt;
            particles.update(dt);
            if (gameOverDelay <= 0 && input.consumeLaunch()) fsm.transition('TITLE');
        },
        render(c) {
            renderGameScene(c);
            c.save();
            c.fillStyle = 'rgba(0,0,0,0.6)';
            c.fillRect(0, 0, NJOX.CANVAS_W, NJOX.CANVAS_H);
            c.fillStyle = NJOX.COLORS.FLOOR;
            c.font = 'bold 32px monospace';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText('GAME OVER', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 - 30);
            c.fillStyle = '#fff';
            c.font = '16px monospace';
            c.fillText('Level ' + levelManager.currentLevel, NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 10);
            if (gameOverDelay <= 0) {
                const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
                c.globalAlpha = pulse;
                c.fillStyle = NJOX.COLORS.TEXT_DIM;
                c.font = '14px monospace';
                c.fillText('Tap to Retry', NJOX.CANVAS_W / 2, NJOX.CANVAS_H / 2 + 60);
            }
            c.restore();
        },
        exit() {}
    });

    // ========== COLLECTIBLES ==========

    function updateCollectibles(dt) {
        if (!game.collectibles) return;
        for (let i = game.collectibles.length - 1; i >= 0; i--) {
            const col = game.collectibles[i];
            col.timer -= dt;
            col.y -= 30 * dt;
            if (col.timer <= 0) game.collectibles.splice(i, 1);
        }
    }

    function renderCollectibles(ctx) {
        if (!game.collectibles) return;
        for (const col of game.collectibles) {
            const alpha = Math.min(1, col.timer);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('+' + col.amount + 'g', col.x, col.y);
            ctx.restore();
        }
    }

    // ========== SHARED RENDERING ==========

    function renderGameScene(c) {
        NJOX.Renderer.drawBackground(c, NJOX.CANVAS_W, NJOX.CANVAS_H);

        c.save();
        c.translate(NJOX.Renderer.shakeOffset.x, NJOX.Renderer.shakeOffset.y);

        if (!bossMode) levelManager.renderPickups(c);

        for (const cr of levelManager.creatures) cr.render(c);
        if (boss) boss.render(c);

        ballManager.render(c);
        particles.render(c);
        renderCollectibles(c);

        c.restore();

        // HUD
        NJOX.HUD.render(c, game);
        if (bossMode && boss) NJOX.BossHPBar.render(c, boss);
        rewardSystem.render(c);

        // Shop bar (always visible after level 1)
        NJOX.ShopUI.render(c, game);
    }

    // ========== SPAWN PATCH ==========

    const origOnHit = NJOX.Creature.prototype.onHit;
    NJOX.Creature.prototype.onHit = function(ball, face, dmg) {
        const result = origOnHit.call(this, ball, face, dmg);
        if (result && result.killed && result.spawns) {
            this._pendingSpawns = result.spawns;
        }
        return result;
    };

    // ========== START ==========

    const loop = new NJOX.GameLoop(
        (dt) => fsm.update(dt),
        () => {
            ctx.clearRect(0, 0, NJOX.CANVAS_W, NJOX.CANVAS_H);
            fsm.render(ctx);
        }
    );

    window._njoxDebug = { fsm, ballManager, levelManager, input, particles, rewardSystem, game };

    fsm.transition('TITLE');
    loop.start();

})();
    </script>
